name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ['3.11', '3.12']
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      # The `carve` dependency is built from python-carve (a PyO3/Rust
      # extension) installed from git, so a Rust toolchain is required.
      - name: Set up Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Install
        run: pip install -e ".[test]"

      - name: Test
        run: pytest tests/
